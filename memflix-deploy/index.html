<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MemFlix — Our Story</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Montserrat:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,300&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --red:#E50914; --dark:#141414; --card:#1a1a1a; --card2:#222;
  --text:#e5e5e5; --muted:#808080; --border:#222;
  --font:'Montserrat',sans-serif; --bebas:'Bebas Neue',sans-serif;
}
html,body{background:var(--dark);color:var(--text);font-family:var(--font);min-height:100vh;overflow-x:hidden;}
.screen{display:none;min-height:100vh;}
.screen.active{display:flex;}

/* ─── CONFIG SCREEN ──── */
#cfg-screen{align-items:center;justify-content:center;padding:24px;background:var(--dark);}
.cfg-box{width:100%;max-width:420px;background:var(--card);border-radius:14px;padding:36px;border:1px solid var(--border);}
.cfg-logo{font-family:var(--bebas);font-size:40px;color:var(--red);letter-spacing:.05em;}
.cfg-sub{font-size:12px;color:var(--muted);margin:4px 0 26px;letter-spacing:.5px;}
.cfg-input{width:100%;background:var(--card2);border:1px solid #2e2e2e;color:var(--text);font-family:var(--font);font-size:13px;padding:11px 14px;border-radius:7px;outline:none;margin-bottom:12px;transition:border .2s;}
.cfg-input:focus{border-color:var(--red);}
.cfg-btn{width:100%;background:var(--red);color:#fff;border:none;padding:13px;border-radius:7px;font-size:14px;font-weight:700;cursor:pointer;font-family:var(--font);margin-top:4px;}
.cfg-btn:hover{background:#c0070f;}
.cfg-hint{font-size:11px;color:var(--muted);margin-bottom:18px;line-height:1.5;}

/* ─── INTRO ──── */
#intro{background:#000;align-items:center;justify-content:center;position:fixed;inset:0;z-index:999;flex-direction:column;gap:16px;}
.intro-logo{font-family:var(--bebas);font-size:clamp(72px,14vw,140px);color:var(--red);letter-spacing:.05em;text-shadow:0 0 60px #e5091488,0 0 120px #e5091433;animation:logoIn .7s cubic-bezier(.16,1,.3,1) both;}
.intro-tagline{font-size:13px;color:#555;letter-spacing:4px;font-weight:400;animation:tagIn 1s .4s ease both;}
.intro-bar{width:180px;height:3px;background:#1a1a1a;border-radius:4px;margin-top:24px;overflow:hidden;animation:fadeIn .5s .3s ease both;}
.intro-progress{height:100%;background:var(--red);animation:progress 2.5s .3s linear both;}
@keyframes logoIn{from{opacity:0;transform:scale(1.5)}to{opacity:1;transform:scale(1)}}
@keyframes tagIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes progress{from{width:0}to{width:100%}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

/* ─── PROFILE SCREEN ──── */
#profiles{flex-direction:column;align-items:center;justify-content:center;gap:48px;padding:40px 24px;position:relative;}
.profiles-logo{position:absolute;top:24px;left:32px;font-family:var(--bebas);font-size:32px;color:var(--red);letter-spacing:.05em;cursor:pointer;}
.profiles-title{font-weight:300;font-size:clamp(20px,4vw,34px);letter-spacing:5px;color:#e5e5e5;}
.profile-grid{display:flex;gap:28px;flex-wrap:wrap;justify-content:center;}
.profile-card{display:flex;flex-direction:column;align-items:center;gap:14px;cursor:pointer;transition:transform .25s ease;}
.profile-card:hover{transform:scale(1.09);}
.profile-avatar{width:148px;height:148px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:58px;border:3px solid transparent;transition:border .2s,box-shadow .2s;overflow:hidden;}
.profile-avatar img{width:100%;height:100%;object-fit:cover;}
.profile-card:hover .profile-avatar{border:3px solid #fff;}
.profile-name{font-size:13px;font-weight:600;letter-spacing:2.5px;color:var(--muted);transition:color .2s;}
.profile-card:hover .profile-name{color:#fff;}

/* ─── BROWSE ──── */
#browse{flex-direction:column;position:relative;}
.navbar{position:sticky;top:0;z-index:100;background:linear-gradient(to bottom,rgba(0,0,0,.95),transparent);padding:18px 4% 28px;display:flex;align-items:center;gap:36px;}
.nav-logo{font-family:var(--bebas);font-size:30px;color:var(--red);letter-spacing:.05em;cursor:pointer;flex-shrink:0;}
.nav-links{display:flex;gap:20px;}
.nav-link{font-size:13px;color:rgba(255,255,255,.65);cursor:pointer;transition:color .2s;white-space:nowrap;}
.nav-link:hover,.nav-link.active{color:#fff;}
.nav-right{margin-left:auto;display:flex;align-items:center;gap:12px;}
.nav-search{background:transparent;border:none;color:var(--muted);font-size:18px;cursor:pointer;transition:color .15s;}
.nav-search:hover{color:#fff;}
.nav-profile{display:flex;align-items:center;gap:9px;cursor:pointer;}
.nav-profile-avatar{width:32px;height:32px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:16px;overflow:hidden;}
.nav-profile-avatar img{width:100%;height:100%;object-fit:cover;}
.nav-profile-name{font-size:13px;color:rgba(255,255,255,.7);}

/* ─── HERO ──── */
.hero{height:clamp(380px,58vh,540px);position:relative;overflow:hidden;margin-top:-80px;cursor:pointer;}
.hero-media{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
.hero-emoji-bg{position:absolute;right:8%;top:50%;transform:translateY(-50%);font-size:clamp(100px,20vw,220px);opacity:.15;user-select:none;pointer-events:none;line-height:1;}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(to right,rgba(0,0,0,.92) 30%,rgba(0,0,0,.1) 100%),linear-gradient(to top,rgba(0,0,0,.8),transparent 50%);}
.hero-content{position:absolute;bottom:0;left:0;right:0;padding:0 4% 52px;}
.hero-tag{display:inline-flex;align-items:center;gap:6px;background:var(--red);color:#fff;font-size:10px;font-weight:700;letter-spacing:2px;padding:4px 12px;border-radius:3px;margin-bottom:14px;text-transform:uppercase;}
.hero-title{font-family:var(--bebas);font-size:clamp(42px,7vw,92px);line-height:1;color:#fff;letter-spacing:.03em;margin-bottom:10px;}
.hero-sub{font-size:clamp(13px,1.8vw,16px);color:rgba(255,255,255,.72);font-weight:300;max-width:520px;margin-bottom:22px;line-height:1.55;}
.hero-btns{display:flex;gap:12px;flex-wrap:wrap;}
.btn-primary{background:#fff;color:#000;border:none;padding:10px 28px;border-radius:4px;font-size:15px;font-weight:700;cursor:pointer;font-family:var(--font);display:inline-flex;align-items:center;gap:8px;transition:background .15s;}
.btn-primary:hover{background:#ffffffcc;}
.btn-secondary{background:rgba(109,109,110,.7);color:#fff;border:none;padding:10px 26px;border-radius:4px;font-size:15px;font-weight:600;cursor:pointer;font-family:var(--font);transition:background .15s;}
.btn-secondary:hover{background:rgba(109,109,110,.9);}

/* ─── SEARCH BAR ──── */
.search-bar-wrap{padding:20px 4% 0;display:none;}
.search-bar-wrap.open{display:block;}
.search-input{width:100%;max-width:480px;background:rgba(255,255,255,.07);border:1px solid #333;color:#fff;font-family:var(--font);font-size:14px;padding:11px 16px;border-radius:8px;outline:none;transition:border .2s;}
.search-input:focus{border-color:var(--red);}
.search-results-label{font-size:13px;color:var(--muted);margin:14px 0 8px;padding:0 4%;}

/* ─── ROWS ──── */
.rows-container{padding:8px 0 100px;}
.row-section{margin-bottom:38px;}
.row-label{font-size:16px;font-weight:700;color:#e5e5e5;margin:0 0 12px;padding:0 4%;letter-spacing:.3px;}
.row-scroll{display:flex;gap:8px;overflow-x:auto;padding:8px 4%;scrollbar-width:none;-ms-overflow-style:none;}
.row-scroll::-webkit-scrollbar{display:none;}

/* ─── MEMORY CARD ──── */
.memory-card{flex:0 0 auto;width:clamp(148px,18vw,198px);height:clamp(88px,11vw,118px);border-radius:6px;position:relative;cursor:pointer;overflow:hidden;transition:transform .25s,box-shadow .25s;flex-shrink:0;}
.memory-card:hover{transform:scale(1.07) translateY(-2px);box-shadow:0 14px 36px rgba(0,0,0,.75);z-index:2;}
.card-media{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
.card-emoji{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:30px;transition:opacity .25s,transform .25s;pointer-events:none;}
.memory-card:hover .card-emoji{opacity:0;transform:translate(-50%,-60%);}
.card-hover-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.9) 0%,rgba(0,0,0,.2) 100%);opacity:0;transition:opacity .25s;display:flex;flex-direction:column;justify-content:flex-end;padding:9px 10px 11px;}
.memory-card:hover .card-hover-overlay{opacity:1;}
.card-title{font-size:12px;font-weight:700;color:#fff;line-height:1.3;}
.card-date{font-size:10px;color:rgba(255,255,255,.55);margin-top:2px;}

/* ─── LOADING SKELETON ──── */
.skeleton-card{flex:0 0 auto;width:clamp(148px,18vw,198px);height:clamp(88px,11vw,118px);border-radius:6px;background:linear-gradient(90deg,#1a1a1a 25%,#2a2a2a 50%,#1a1a1a 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;}
@keyframes shimmer{from{background-position:200% 0}to{background-position:-200% 0}}

/* ─── MODAL ──── */
#modal-overlay{display:none;position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.88);align-items:center;justify-content:center;padding:24px;overflow-y:auto;}
#modal-overlay.open{display:flex;}
.modal-box{width:100%;max-width:560px;border-radius:13px;overflow:hidden;background:var(--card);box-shadow:0 32px 100px rgba(0,0,0,.9);animation:modalIn .3s cubic-bezier(.16,1,.3,1);margin:auto;}
@keyframes modalIn{from{opacity:0;transform:scale(.9) translateY(20px)}to{opacity:1;transform:scale(1) translateY(0)}}
.modal-banner{height:240px;display:flex;align-items:center;justify-content:center;font-size:72px;position:relative;overflow:hidden;}
.modal-banner-media{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;}
.modal-banner-emoji{position:relative;z-index:1;font-size:72px;}
.modal-close{position:absolute;top:14px;right:14px;width:32px;height:32px;border-radius:50%;background:rgba(0,0,0,.7);border:none;color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:10;transition:background .15s;}
.modal-close:hover{background:rgba(0,0,0,.95);}
.modal-body{padding:24px 28px 32px;}
.modal-header{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px;gap:12px;}
.modal-title{font-size:24px;font-weight:800;color:#fff;line-height:1.2;}
.modal-date-badge{background:var(--red);color:#fff;font-size:10px;font-weight:700;letter-spacing:1.5px;padding:4px 10px;border-radius:3px;flex-shrink:0;margin-top:5px;text-transform:uppercase;white-space:nowrap;}
.modal-meta-date{font-size:12px;color:var(--muted);margin-bottom:14px;}
.modal-note{font-size:14px;line-height:1.85;color:#bbb;font-weight:300;font-style:italic;border-left:3px solid var(--red);padding-left:14px;}
.modal-actions{margin-top:22px;display:flex;gap:10px;}
.modal-btn-primary{flex:1;padding:12px 0;background:#fff;color:#000;border:none;border-radius:5px;font-size:14px;font-weight:700;cursor:pointer;font-family:var(--font);display:flex;align-items:center;justify-content:center;gap:8px;transition:background .15s;}
.modal-btn-primary:hover{background:#ffffffcc;}
.modal-btn-heart{padding:12px 18px;background:rgba(109,109,110,.45);color:#fff;border:none;border-radius:5px;font-size:15px;cursor:pointer;font-family:var(--font);transition:background .15s;}
.modal-btn-heart:hover,.modal-btn-heart.liked{background:rgba(229,9,20,.5);color:#fff;}

/* ─── SLIDESHOW ──── */
#slideshow-overlay{display:none;position:fixed;inset:0;z-index:800;background:#000;flex-direction:column;align-items:center;justify-content:center;}
#slideshow-overlay.open{display:flex;}
.slide-media-wrap{width:100%;height:100%;position:relative;}
.slide-bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;filter:brightness(.35) blur(12px);transform:scale(1.08);}
.slide-main{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;}
.slide-emoji-full{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:clamp(80px,18vw,160px);}
.slide-info{position:absolute;bottom:0;left:0;right:0;padding:24px 5% 40px;background:linear-gradient(to top,rgba(0,0,0,.85),transparent);}
.slide-title{font-family:var(--bebas);font-size:clamp(32px,5vw,56px);letter-spacing:.03em;color:#fff;margin-bottom:6px;}
.slide-note{font-size:14px;color:rgba(255,255,255,.65);font-style:italic;max-width:600px;line-height:1.6;}
.slide-controls{position:absolute;top:16px;right:16px;display:flex;gap:10px;}
.slide-btn{background:rgba(0,0,0,.6);border:1px solid rgba(255,255,255,.15);color:#fff;width:38px;height:38px;border-radius:50%;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s;}
.slide-btn:hover{background:rgba(0,0,0,.9);}
.slide-counter{position:absolute;top:20px;left:50%;transform:translateX(-50%);font-size:12px;color:rgba(255,255,255,.5);letter-spacing:2px;}
.slide-nav{position:absolute;top:50%;transform:translateY(-50%);display:flex;width:100%;justify-content:space-between;padding:0 12px;pointer-events:none;}
.slide-nav-btn{background:rgba(0,0,0,.55);border:1px solid rgba(255,255,255,.1);color:#fff;width:44px;height:44px;border-radius:50%;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s;pointer-events:all;}
.slide-nav-btn:hover{background:rgba(0,0,0,.88);}

/* ─── EMPTY ──── */
.empty-row{font-size:13px;color:#444;padding:18px 0;font-style:italic;}
.empty-profile{text-align:center;padding:80px 24px;color:var(--muted);}
.empty-profile .e-icon{font-size:48px;margin-bottom:14px;}
.empty-profile p{font-size:14px;line-height:1.7;}

/* ─── RESPONSIVE ──── */
@media(max-width:600px){
  .nav-links{display:none;}
  .profile-avatar{width:100px;height:100px;font-size:40px;}
  .profile-grid{gap:14px;}
  .modal-banner{height:180px;}
  .modal-banner-emoji{font-size:52px;}
}
</style>
</head>
<body>

<!-- CONFIG -->
<div id="cfg-screen" class="screen">
  <div class="cfg-box">
    <div class="cfg-logo">MemFlix</div>
    <p class="cfg-sub">Enter your Supabase credentials to load memories</p>
    <p class="cfg-hint">These are saved in your browser and never sent anywhere else.<br/>Find them in: Supabase → Settings → API</p>
    <input id="cfgUrl" class="cfg-input" type="text" placeholder="Supabase Project URL (https://xxxx.supabase.co)"/>
    <input id="cfgKey" class="cfg-input" type="text" placeholder="Supabase Anon Key (eyJhbGci...)"/>
    <button class="cfg-btn" onclick="saveConfig()">Open MemFlix ▶</button>
  </div>
</div>

<!-- INTRO -->
<div id="intro" class="screen">
  <div class="intro-logo">MemFlix</div>
  <div class="intro-tagline">A LOVE STORY. YOUR STORY.</div>
  <div class="intro-bar"><div class="intro-progress"></div></div>
</div>

<!-- PROFILES -->
<div id="profiles" class="screen">
  <div class="profiles-logo" onclick="showProfiles()">MemFlix</div>
  <h1 class="profiles-title">Who's Watching?</h1>
  <div class="profile-grid" id="profileGrid"></div>
</div>

<!-- BROWSE -->
<div id="browse" class="screen" style="flex-direction:column;">
  <nav class="navbar">
    <span class="nav-logo" onclick="showProfiles()">MemFlix</span>
    <div class="nav-links">
      <span class="nav-link active" onclick="filterRows('all')">Home</span>
      <span class="nav-link" id="tabMemories" onclick="filterRows('memories')">Memories</span>
      <span class="nav-link" id="tabPhotos" onclick="filterRows('photos')">Photos</span>
      <span class="nav-link" id="tabVideos" onclick="filterRows('videos')">Videos</span>
    </div>
    <div class="nav-right">
      <button class="nav-search" onclick="toggleSearch()" title="Search">🔍</button>
      <div class="nav-profile" onclick="showProfiles()">
        <div class="nav-profile-avatar" id="navAvatar"></div>
        <span class="nav-profile-name" id="navName"></span>
      </div>
    </div>
  </nav>
  <div class="search-bar-wrap" id="searchBarWrap">
    <input id="searchInput" class="search-input" type="text" placeholder="Search memories…" oninput="doSearch(this.value)"/>
  </div>
  <div class="hero" id="heroSection">
    <div class="hero-emoji-bg" id="heroBigEmoji"></div>
    <div class="hero-overlay"></div>
    <div class="hero-content">
      <div class="hero-tag">⭐ Featured Memory</div>
      <div class="hero-title" id="heroTitle">Loading…</div>
      <div class="hero-sub" id="heroSub"></div>
      <div class="hero-btns">
        <button class="btn-primary" id="heroPlayBtn">▶ Open Memory</button>
        <button class="btn-secondary" id="heroInfoBtn">ℹ More Info</button>
      </div>
    </div>
  </div>
  <div class="rows-container" id="rowsContainer"></div>
</div>

<!-- MEMORY MODAL -->
<div id="modal-overlay" onclick="closeModal()">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-banner" id="modalBanner">
      <button class="modal-close" onclick="closeModal()">✕</button>
      <span class="modal-banner-emoji" id="modalEmoji"></span>
    </div>
    <div class="modal-body">
      <div class="modal-header">
        <div class="modal-title" id="modalTitle"></div>
        <div class="modal-date-badge">Memory</div>
      </div>
      <div class="modal-meta-date" id="modalMetaDate"></div>
      <p class="modal-note" id="modalNote"></p>
      <div class="modal-actions">
        <button class="modal-btn-primary" id="modalPlayBtn">▶ Play Memory</button>
        <button class="modal-btn-heart" id="heartBtn" onclick="toggleHeart()">♡</button>
      </div>
    </div>
  </div>
</div>

<!-- SLIDESHOW -->
<div id="slideshow-overlay">
  <div class="slide-media-wrap" id="slideMediaWrap"></div>
  <div class="slide-counter" id="slideCounter"></div>
  <div class="slide-controls">
    <button class="slide-btn" onclick="closeSlideshow()" title="Close">✕</button>
    <button class="slide-btn" onclick="toggleAutoplay()" id="autoplayBtn" title="Pause">⏸</button>
  </div>
  <div class="slide-nav">
    <button class="slide-nav-btn" onclick="slidePrev()">‹</button>
    <button class="slide-nav-btn" onclick="slideNext()">›</button>
  </div>
</div>

<script>
// ─────────────────────────────────────────────────────
//  PROFILE CONFIG
// ─────────────────────────────────────────────────────
const PROFILES = [
  { id:'her', name:'Her Name',  emoji:'👸', gradient:'linear-gradient(135deg,#f093fb,#f5576c)', accent:'#f5576c' },
  { id:'me',  name:'Your Name', emoji:'🧑‍💻', gradient:'linear-gradient(135deg,#4facfe,#00f2fe)', accent:'#4facfe' },
  { id:'us',  name:'Us ❤️',     emoji:'💑', gradient:'linear-gradient(135deg,#E50914,#ff6b6b)', accent:'#E50914' },
];
// ↑ Change name values above to personalise profile names

// ─────────────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────────────
let db = null;
let activeProfile = null;
let allMemories = [], allRows = [];
let currentMemory = null;
let likedMemories = new Set(JSON.parse(localStorage.getItem('mf_liked')||'[]'));

// slideshow
let slideItems = [], slideIndex = 0, slideTimer = null;
let autoplayOn = true;

// ─────────────────────────────────────────────────────
//  CONFIG
// ─────────────────────────────────────────────────────
function saveConfig() {
  const url = document.getElementById('cfgUrl').value.trim();
  const key = document.getElementById('cfgKey').value.trim();
  if (!url || !key) { alert('Both fields required'); return; }
  localStorage.setItem('mf_url', url);
  localStorage.setItem('mf_key', key);
  startApp();
}

function startApp() {
  // ── HARDCODED CREDENTIALS (filled at deploy time) ──
  const SUPABASE_URL = 'https://naditkdfboevavbsdhvz.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5hZGl0a2RmYm9ldmF2YnNkaHZ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk2MTYwNzksImV4cCI6MjA5NTE5MjA3OX0.n5H4NUBW7tUJBdNbaLwV3P5xDwbSkWUjf_Qosj15e-s';
  if (SUPABASE_URL !== 'https://naditkdfboevavbsdhvz.supabase.co') {
    localStorage.setItem('mf_url', SUPABASE_URL);
    localStorage.setItem('mf_key', SUPABASE_KEY);
  }
  const url = localStorage.getItem('mf_url');
  const key = localStorage.getItem('mf_key');
  if (!url || !key) { show('cfg-screen'); return; }
  db = supabase.createClient(url, key);
  showIntro();
}

// ─────────────────────────────────────────────────────
//  SCREEN HELPERS
// ─────────────────────────────────────────────────────
function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const el = document.getElementById(id);
  if (el) el.classList.add('active');
}

// ─────────────────────────────────────────────────────
//  INTRO
// ─────────────────────────────────────────────────────
function showIntro() {
  show('intro');
  setTimeout(() => {
    const el = document.getElementById('intro');
    el.style.transition = 'opacity .8s ease';
    el.style.opacity = '0';
    setTimeout(() => {
      el.classList.remove('active');
      el.style.opacity = '';
      buildProfiles();
      show('profiles');
    }, 800);
  }, 2800);
}

// ─────────────────────────────────────────────────────
//  PROFILES
// ─────────────────────────────────────────────────────
function buildProfiles() {
  const grid = document.getElementById('profileGrid');
  grid.innerHTML = '';
  PROFILES.forEach(p => {
    const card = document.createElement('div');
    card.className = 'profile-card';
    card.innerHTML = `
      <div class="profile-avatar" style="background:${p.gradient}"
           onmouseenter="this.style.boxShadow='0 0 28px ${p.accent}88'"
           onmouseleave="this.style.boxShadow='none'">
        <span>${p.emoji}</span>
      </div>
      <span class="profile-name">${p.name}</span>`;
    card.onclick = () => selectProfile(p);
    grid.appendChild(card);
  });
}

function showProfiles() { show('profiles'); }

function selectProfile(p) {
  activeProfile = p;
  const nav = document.getElementById('navAvatar');
  nav.style.background = p.gradient;
  nav.innerHTML = `<span>${p.emoji}</span>`;
  document.getElementById('navName').textContent = p.name;
  loadBrowse(p.id);
}

// ─────────────────────────────────────────────────────
//  BROWSE — Load from Supabase
// ─────────────────────────────────────────────────────
async function loadBrowse(profileId) {
  show('browse');
  document.getElementById('heroTitle').textContent = 'Loading…';
  document.getElementById('heroSub').textContent = '';
  renderSkeletonRows();

  try {
    const [rowsRes, memsRes] = await Promise.all([
      db.from('memory_rows').select('*').eq('profile_id', profileId).order('sort_order'),
      db.from('memories').select('*').eq('profile_id', profileId).order('sort_order'),
    ]);
    if (rowsRes.error) throw rowsRes.error;
    if (memsRes.error) throw memsRes.error;
    allRows = rowsRes.data || [];
    allMemories = memsRes.data || [];
    renderHero();
    renderRows(allRows, allMemories);
  } catch(e) {
    document.getElementById('heroTitle').textContent = 'Could not load';
    document.getElementById('heroSub').textContent = e.message;
    document.getElementById('rowsContainer').innerHTML = '';
  }
}

// ─────────────────────────────────────────────────────
//  HERO
// ─────────────────────────────────────────────────────
function renderHero() {
  const featured = allMemories.find(m => m.is_featured) || allMemories[0];
  if (!featured) {
    document.getElementById('heroTitle').textContent = activeProfile.name;
    document.getElementById('heroSub').textContent = 'No memories yet — add some in the Admin panel!';
    document.getElementById('heroSection').style.background = activeProfile.gradient;
    document.getElementById('heroBigEmoji').textContent = activeProfile.emoji;
    return;
  }
  currentMemory = featured;
  const hero = document.getElementById('heroSection');

  // Remove old media
  hero.querySelectorAll('.hero-media').forEach(e => e.remove());

  if (featured.media_url) {
    hero.style.background = '#000';
    document.getElementById('heroBigEmoji').textContent = '';
    const mediaEl = featured.media_type === 'video'
      ? Object.assign(document.createElement('video'), { src: featured.media_url, autoplay: true, muted: true, loop: true, className: 'hero-media' })
      : Object.assign(document.createElement('img'), { src: featured.media_url, className: 'hero-media', alt: featured.title });
    mediaEl.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;object-fit:cover;';
    hero.insertBefore(mediaEl, hero.firstChild);
  } else {
    hero.style.background = featured.gradient;
    document.getElementById('heroBigEmoji').textContent = featured.emoji;
  }

  document.getElementById('heroTitle').textContent = featured.title;
  document.getElementById('heroSub').textContent = featured.subtitle || '';
  document.getElementById('heroPlayBtn').onclick = () => openModal(featured);
  document.getElementById('heroInfoBtn').onclick = () => openModal(featured);
}

// ─────────────────────────────────────────────────────
//  ROWS
// ─────────────────────────────────────────────────────
function renderSkeletonRows() {
  const c = document.getElementById('rowsContainer');
  c.innerHTML = '';
  for (let i = 0; i < 3; i++) {
    const row = document.createElement('div');
    row.className = 'row-section';
    row.innerHTML = `<div class="row-label" style="background:#2a2a2a;width:200px;height:16px;border-radius:4px;margin-bottom:14px;"></div><div class="row-scroll">${'<div class="skeleton-card"></div>'.repeat(6)}</div>`;
    c.appendChild(row);
  }
}

function renderRows(rows, memories) {
  const c = document.getElementById('rowsContainer');
  c.innerHTML = '';

  if (rows.length === 0 && memories.length === 0) {
    c.innerHTML = `<div class="empty-profile"><div class="e-icon">${activeProfile.emoji}</div><p>No memories yet.<br/>Open the Admin panel to start adding photos, videos and notes!</p></div>`;
    return;
  }

  rows.forEach(row => {
    const mems = memories.filter(m => m.row_id === row.id);
    if (mems.length === 0) return;
    const sec = document.createElement('div');
    sec.className = 'row-section';
    sec.innerHTML = `<div class="row-label">${escHtml(row.label)}</div><div class="row-scroll" id="scroll-${row.id}"></div>`;
    c.appendChild(sec);
    const scroll = sec.querySelector('.row-scroll');
    mems.forEach(m => scroll.appendChild(makeMemCard(m)));
  });

  // Unassigned
  const unassigned = memories.filter(m => !m.row_id);
  if (unassigned.length > 0) {
    const sec = document.createElement('div');
    sec.className = 'row-section';
    sec.innerHTML = `<div class="row-label">More Memories ✨</div><div class="row-scroll" id="scroll-unassigned"></div>`;
    c.appendChild(sec);
    const scroll = sec.querySelector('.row-scroll');
    unassigned.forEach(m => scroll.appendChild(makeMemCard(m)));
  }

  // Special Play All button
  if (memories.length > 1) {
    const strip = document.createElement('div');
    strip.style.cssText = 'padding:0 4% 20px;';
    strip.innerHTML = `<button onclick="startSlideshow()" style="background:transparent;border:1px solid #333;color:#aaa;padding:12px 26px;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--font);display:inline-flex;align-items:center;gap:9px;transition:all .15s;" onmouseover="this.style.borderColor='#666';this.style.color='#fff'" onmouseout="this.style.borderColor='#333';this.style.color='#aaa'">✨ Play All Memories Slideshow</button>`;
    c.appendChild(strip);
  }
}

function makeMemCard(m) {
  const card = document.createElement('div');
  card.className = 'memory-card';
  card.style.background = m.gradient;

  if (m.media_url) {
    if (m.media_type === 'video') {
      card.innerHTML = `<video class="card-media" src="${m.media_url}" muted playsinline preload="metadata"></video>`;
    } else {
      card.innerHTML = `<img class="card-media" src="${m.media_url}" alt="${escHtml(m.title)}" loading="lazy"/>`;
    }
  } else {
    card.innerHTML = `<div class="card-emoji">${m.emoji || '📸'}</div>`;
  }

  card.innerHTML += `
    <div class="card-hover-overlay">
      <div class="card-title">${escHtml(m.title)}</div>
      ${m.date_label ? `<div class="card-date">${escHtml(m.date_label)}</div>` : ''}
    </div>`;

  card.onclick = () => openModal(m);
  return card;
}

// ─────────────────────────────────────────────────────
//  MODAL
// ─────────────────────────────────────────────────────
function openModal(m) {
  currentMemory = m;
  const banner = document.getElementById('modalBanner');

  // Clear old media
  banner.querySelectorAll('.modal-banner-media').forEach(e => e.remove());
  document.getElementById('modalEmoji').style.display = '';

  if (m.media_url) {
    document.getElementById('modalEmoji').style.display = 'none';
    banner.style.background = '#000';
    if (m.media_type === 'video') {
      const vid = document.createElement('video');
      vid.src = m.media_url; vid.controls = true; vid.autoplay = true;
      vid.className = 'modal-banner-media';
      vid.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;object-fit:cover;';
      banner.appendChild(vid);
    } else {
      const img = document.createElement('img');
      img.src = m.media_url; img.className = 'modal-banner-media';
      img.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;object-fit:cover;';
      banner.appendChild(img);
    }
  } else {
    banner.style.background = m.gradient;
    document.getElementById('modalEmoji').textContent = m.emoji || '📸';
  }

  document.getElementById('modalTitle').textContent = m.title;
  document.getElementById('modalMetaDate').textContent = m.date_label || '';
  document.getElementById('modalNote').textContent = m.note ? `"${m.note}"` : '';

  // Heart state
  const liked = likedMemories.has(m.id);
  const hb = document.getElementById('heartBtn');
  hb.textContent = liked ? '♥' : '♡';
  hb.classList.toggle('liked', liked);

  document.getElementById('modalPlayBtn').onclick = () => {
    if (m.media_url && m.media_type === 'video') {
      banner.querySelector('video')?.play();
    } else {
      closeModal();
      startSlideshow([m]);
    }
  };

  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal() {
  const overlay = document.getElementById('modal-overlay');
  overlay.classList.remove('open');
  overlay.querySelectorAll('video').forEach(v => { v.pause(); v.src = ''; });
}

function toggleHeart() {
  if (!currentMemory) return;
  const id = currentMemory.id;
  if (likedMemories.has(id)) { likedMemories.delete(id); } else { likedMemories.add(id); }
  localStorage.setItem('mf_liked', JSON.stringify([...likedMemories]));
  const liked = likedMemories.has(id);
  const hb = document.getElementById('heartBtn');
  hb.textContent = liked ? '♥' : '♡';
  hb.classList.toggle('liked', liked);
}

// ─────────────────────────────────────────────────────
//  SEARCH
// ─────────────────────────────────────────────────────
function toggleSearch() {
  const wrap = document.getElementById('searchBarWrap');
  const open = wrap.classList.toggle('open');
  if (open) { document.getElementById('searchInput').focus(); doSearch(''); }
  else { doSearch(''); }
}

function doSearch(q) {
  q = q.toLowerCase().trim();
  const container = document.getElementById('rowsContainer');
  if (!q) { renderRows(allRows, allMemories); return; }
  const filtered = allMemories.filter(m =>
    m.title.toLowerCase().includes(q) ||
    (m.note||'').toLowerCase().includes(q) ||
    (m.date_label||'').toLowerCase().includes(q)
  );
  container.innerHTML = '';
  if (filtered.length === 0) {
    container.innerHTML = `<p class="search-results-label">No memories found for "${escHtml(q)}"</p>`;
    return;
  }
  container.innerHTML = `<p class="search-results-label">${filtered.length} memor${filtered.length===1?'y':'ies'} found</p>`;
  const sec = document.createElement('div');
  sec.className = 'row-section';
  const scroll = document.createElement('div');
  scroll.className = 'row-scroll';
  filtered.forEach(m => scroll.appendChild(makeMemCard(m)));
  sec.appendChild(scroll);
  container.appendChild(sec);
}

function filterRows(type) {
  const container = document.getElementById('rowsContainer');
  document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
  event.target.classList.add('active');

  if (type === 'all') { renderRows(allRows, allMemories); return; }

  const filtered = type === 'photos'
    ? allMemories.filter(m => m.media_type === 'image')
    : type === 'videos'
    ? allMemories.filter(m => m.media_type === 'video')
    : allMemories;

  container.innerHTML = '';
  if (filtered.length === 0) {
    container.innerHTML = `<div class="empty-profile"><div class="e-icon">📭</div><p>No ${type} added yet.</p></div>`;
    return;
  }
  const sec = document.createElement('div');
  sec.className = 'row-section';
  sec.innerHTML = `<div class="row-label">${type.charAt(0).toUpperCase()+type.slice(1)}</div>`;
  const scroll = document.createElement('div');
  scroll.className = 'row-scroll';
  filtered.forEach(m => scroll.appendChild(makeMemCard(m)));
  sec.appendChild(scroll);
  container.appendChild(sec);
}

// ─────────────────────────────────────────────────────
//  SLIDESHOW
// ─────────────────────────────────────────────────────
function startSlideshow(items) {
  slideItems = items || allMemories;
  if (slideItems.length === 0) return;
  slideIndex = 0;
  autoplayOn = true;
  document.getElementById('autoplayBtn').textContent = '⏸';
  document.getElementById('slideshow-overlay').classList.add('open');
  renderSlide();
  startAutoplay();
}

function renderSlide() {
  const m = slideItems[slideIndex];
  const wrap = document.getElementById('slideMediaWrap');
  wrap.innerHTML = '';

  if (m.media_url) {
    if (m.media_type === 'video') {
      const vid = document.createElement('video');
      vid.src = m.media_url; vid.autoplay = true; vid.muted = true; vid.loop = true;
      vid.style.cssText = 'position:absolute;inset:0;width:100%;height:100%;object-fit:contain;';
      wrap.appendChild(vid);
    } else {
      const bg = document.createElement('img');
      bg.src = m.media_url; bg.className = 'slide-bg'; wrap.appendChild(bg);
      const main = document.createElement('img');
      main.src = m.media_url; main.className = 'slide-main'; main.alt = m.title;
      wrap.appendChild(main);
    }
  } else {
    wrap.style.background = m.gradient;
    const emoji = document.createElement('div');
    emoji.className = 'slide-emoji-full'; emoji.textContent = m.emoji || '📸';
    wrap.appendChild(emoji);
  }

  // Info panel
  const info = document.createElement('div');
  info.className = 'slide-info';
  info.innerHTML = `<div class="slide-title">${escHtml(m.title)}${m.date_label ? ` <span style="font-size:.5em;opacity:.6">${escHtml(m.date_label)}</span>` : ''}</div>${m.note ? `<div class="slide-note">"${escHtml(m.note)}"</div>` : ''}`;
  wrap.appendChild(info);

  document.getElementById('slideCounter').textContent = `${slideIndex+1} / ${slideItems.length}`;
}

function slideNext() { slideIndex = (slideIndex+1) % slideItems.length; renderSlide(); }
function slidePrev() { slideIndex = (slideIndex-1+slideItems.length) % slideItems.length; renderSlide(); }

function startAutoplay() {
  clearInterval(slideTimer);
  if (autoplayOn) slideTimer = setInterval(slideNext, 4000);
}

function toggleAutoplay() {
  autoplayOn = !autoplayOn;
  document.getElementById('autoplayBtn').textContent = autoplayOn ? '⏸' : '▶';
  startAutoplay();
}

function closeSlideshow() {
  clearInterval(slideTimer);
  document.getElementById('slideshow-overlay').classList.remove('open');
  document.getElementById('slideMediaWrap').innerHTML = '';
}

// ─────────────────────────────────────────────────────
//  KEYBOARD SHORTCUTS
// ─────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  const ss = document.getElementById('slideshow-overlay').classList.contains('open');
  if (ss) {
    if (e.key === 'ArrowRight') slideNext();
    if (e.key === 'ArrowLeft') slidePrev();
    if (e.key === 'Escape') closeSlideshow();
    return;
  }
  if (e.key === 'Escape') closeModal();
});

// ─────────────────────────────────────────────────────
//  UTILS
// ─────────────────────────────────────────────────────
function escHtml(str) {
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─────────────────────────────────────────────────────
//  BOOT
// ─────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', startApp);
</script>
</body>
</html>
